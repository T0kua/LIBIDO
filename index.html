<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>L1B1D0 · вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1e1e2f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .auth-card {
            max-width: 400px;
            width: 100%;
            background: #191a2b;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: 40px 28px;
        }

        .logo {
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #4a4cff; /* ваш акцентный синий */
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 32px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #2f314f;
            border-radius: 40px;
            font-size: 1rem;
            transition: 0.2s;
            background: #191a2b;
            color: white;
        }

        .input::placeholder {
            color: #888;
        }

        .input:focus {
            outline: none;
            border-color: #4a4cff;
            background: #2f314f;
        }

        .btn {
            background: #4a4cff;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn.secondary {
            background: transparent;
            color: white;
            border: 2px solid #2f314f;
            margin-top: 0;
        }

        .btn.secondary:hover {
            background: #2f314f;
            border-color: #4a4cff;
            color: white;
        }

        .btn:hover {
            background: #3a3ccc;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
            .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">L1B1D0</div>
        <div class="sub">secure messenger</div>
        <div class="form">
            <input type="text" class="input" id="usernameInput" placeholder="Имя пользователя">
            <input type="password" class="input" id="passwordInput" placeholder="Пароль">

            <button class="btn" id="loginBtn">Войти</button>
            <button class="btn secondary" id="registerBtn">Создать аккаунт</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
