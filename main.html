<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>L1B1D0 · чат</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #1e1e2f;
        }

        .app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #1e1e2f;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            width: 320px;
            background: #191a2b;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2f314f;
            height: 100%;
            overflow-x: hidden; /* убирает горизонтальный скролл, если что-то вылезло */
        }

        .search-container {
            padding: 20px;
            border-bottom: 1px solid #2f314f;
        }

        .search-container input {
            width: 100%;
            padding: 12px 16px;
            background: #2f314f;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .search-container input::placeholder {
            color: #888;
        }

        .search-container input:focus {
            background: #3b3d63;
            box-shadow: 0 0 0 2px #4a4cff;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #2f314f;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .chat-item:hover {
            background: #3b3d63;
            transform: translateY(-1px);
        }

        .chat-item.active {
            background: #4a4cff;
        }

        .chat-avatar {
            position: relative;
            width: 48px;
            height: 48px;
            background: #191a2b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #aaa;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #9e9e9e;
            border: 2px solid #191a2b;
        }

        .online-indicator.online {
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
        }

        .chat-info {
            flex: 1;
            min-width: 0; /* важно для усечения текста */
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-preview {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            text-align: right;
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
        }

        .badge {
            background: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 11px;
            margin-left: 6px;
        }

        .settings {
            padding: 16px 20px;
            border-top: 1px solid #2f314f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap; /* позволяет переносить элементы на новую строку при нехватке места */
            font-size: 14px;
        }

        .settings i {
            font-size: 20px;
            color: #4a4cff;
        }

        .settings > div {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0; /* для обрезания текста */
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .settings button {
            background: #2f314f;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        .settings button:hover {
            background: #3b3d63;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0; /* для предотвращения переполнения */
        }

        .messages {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%; /* общее ограничение ширины сообщения */
            padding: 12px 18px;
            background: #2f314f;
            border-radius: 20px;
            color: white;
            align-self: flex-start;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .message.own {
            background: #4a4cff;
            align-self: flex-end;
        }

        .message .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            cursor: pointer;
        }

        .input-area {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            background: #191a2b;
            border-top: 1px solid #2f314f;
            width: 100%;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: #2f314f;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 15px;
            outline: none;
            min-width: 0; /* позволяет текстовому полю сжиматься */
        }

        .input-area input[type="text"]::placeholder {
            color: #888;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: #4a4cff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .input-area button:hover {
            background: #3a3ccc;
            transform: scale(1.05);
        }

        #sendImageBtn {
            background: #2f314f;
            color: #aaa;
        }

        #sendImageBtn:hover {
            background: #3b3d63;
            color: white;
        }

        /* Мобильная навигация */
        @media (max-width: 768px) {
            .sidebar {
                width: 100% !important;
                display: flex !important;
            }
            .chat {
                display: none !important;
                width: 100% !important;
            }
            body.chat-open .sidebar {
                display: none !important;
            }
            body.chat-open .chat {
                display: flex !important;
            }

            /* Адаптация размеров для мобильных */
            .message {
                max-width: 85%;
                padding: 10px 14px;
                font-size: 15px;
            }
            .input-area {
                padding: 12px 15px;
            }
            .input-area input[type="text"] {
                padding: 10px 14px;
                font-size: 15px;
            }
            .input-area button {
                width: 42px;
                height: 42px;
            }
            .settings {
                padding: 12px 16px;
                font-size: 13px;
            }
            .settings i {
                font-size: 18px;
            }
            .settings button {
                padding: 5px 10px;
                font-size: 13px;
                max-width: 80px;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 480px) {
            .message {
                max-width: 90%;
                font-size: 14px;
            }
            .chat-item {
                padding: 10px 12px;
            }
            .chat-avatar {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="search-container">
                <input type="text" id="searchUser" placeholder="поиск">
            </div>
            <div class="chat-list" id="chatList"></div>
            <div class="settings" id="userDisplay">
                <div>
                    <i class="fas fa-user-circle"></i>
                    <span>username</span>
                </div>
                <button id="logoutBtn">Выйти</button>
            </div>
        </aside>
        <main class="chat" id="chat">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение">
                <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*,audio/*,.pdf,.doc,.txt">
                <button id="sendImageBtn" title="Отправить файл"><i class="fas fa-paperclip"></i></button>
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
