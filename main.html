<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="chat-item">
            <img src="#" alt="">
            <span>Общий чат</span>
        </div>

        <div class="settings" id="userDisplay">
            <!-- Здесь будет логин -->
        </div>
    </aside>

    <!-- Chat -->
    <main class="chat">

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение">
            <button id="sendBtn"></button>
        </div>

    </main>

</div>

<script src="main.js"></script>
</body>
</html>
