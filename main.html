<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>L1B1D0 · чат</title>
    <!-- Подключаем Font Awesome для красивых иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- Дополнительные стили для улучшения (можно встроить или добавить в style.css) -->
    <style>
        /* Дополнения к вашему основному CSS */
        .app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #1e1e2f;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            width: 320px;
            background: #191a2b;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2f314f;
        }

        .search-container {
            padding: 20px;
            border-bottom: 1px solid #2f314f;
        }

        .search-container input {
            width: 100%;
            padding: 12px 16px;
            background: #2f314f;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .search-container input::placeholder {
            color: #888;
        }

        .search-container input:focus {
            background: #3b3d63;
            box-shadow: 0 0 0 2px #4a4cff;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #2f314f;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .chat-item:hover {
            background: #3b3d63;
            transform: translateY(-1px);
        }

        .chat-item.active {
            background: #4a4cff;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: #191a2b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #aaa;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            text-align: right;
            font-size: 12px;
            color: #aaa;
        }

        .badge {
            background: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 11px;
            margin-left: 6px;
        }

        .settings {
            padding: 20px;
            border-top: 1px solid #2f314f;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings i {
            font-size: 20px;
            color: #4a4cff;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e2f;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            background: #2f314f;
            border-radius: 20px;
            color: white;
            align-self: flex-start;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .message.own {
            background: #4a4cff;
            align-self: flex-end;
        }

        .message .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: #191a2b;
            border-top: 1px solid #2f314f;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            background: #2f314f;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-area input[type="text"]::placeholder {
            color: #888;
        }

        .input-area button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: #4a4cff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area button:hover {
            background: #3a3ccc;
            transform: scale(1.05);
        }

        #sendImageBtn {
            background: #2f314f;
            color: #aaa;
        }

        #sendImageBtn:hover {
            background: #3b3d63;
            color: white;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
                overflow: hidden;
            }
            .sidebar .chat-info,
            .sidebar .chat-preview,
            .sidebar .chat-meta,
            .sidebar .settings span {
                display: none;
            }
            .search-container input {
                padding: 12px;
                text-align: center;
            }
            .chat-item {
                justify-content: center;
                padding: 12px;
            }
            .chat-avatar {
                margin: 0;
            }
            .settings {
                justify-content: center;
            }
            .settings i {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .app {
                border-radius: 0;
            }
            .sidebar {
                width: 60px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="search-container">
                <input type="text" id="searchUser" placeholder="поиск">
            </div>
            <div class="chat-list" id="chatList"></div>
            <div class="settings" id="userDisplay">
                <i class="fas fa-user-circle"></i>
                <span>username</span>
            </div>
        </aside>

        <!-- Основная область чата -->
        <main class="chat">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение">
                <input type="file" id="fileInput" style="display: none;" accept="image/*">
                <button id="sendImageBtn" title="Отправить изображение"><i class="fas fa-image"></i></button>
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
